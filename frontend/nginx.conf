types {
    application/javascript  js mjs;
    text/css                css;
    text/html               html htm;
    image/svg+xml           svg;
    image/jpeg              jpg jpeg;
    image/png               png;
    application/json        json;
    font/woff2              woff2;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}